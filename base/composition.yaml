---
# Composition: parametriza por spec.type (live | nonlive | ephemeral) usando
# dict lookup. Cero condicionales sobre type. Cada item es un manifest YAML
# templatizado — KCL solo aplica .replace() con los defaults del type.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: environment
  labels:
    type: environment
spec:
  compositeTypeRef:
    apiVersion: env.docline.io/v1alpha1
    kind: XEnvironment
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLRun
        spec:
          source: |
            import yaml

            oxr = option("params").oxr
            spec = oxr.spec
            env = spec.name
            envType = spec.type
            stage = spec.stage if spec?.stage else env
            ns = "infra-" + env

            # Defaults por type — única tabla de verdad en este paquete.
            type_defaults = {
                "live"     : {veleroRetention="720h", deletionPolicy="Orphan", infisicalProject="env-live-secrets",     veleroEnabled=True}
                "nonlive"  : {veleroRetention="168h", deletionPolicy="Delete", infisicalProject="env-non-live-secrets", veleroEnabled=False}
                "ephemeral": {veleroRetention="0",    deletionPolicy="Delete", infisicalProject="env-non-live-secrets", veleroEnabled=False}
            }
            d = type_defaults[envType]

            # Override de Velero opt-out via spec.veleroSchedule.enabled=false.
            vsched = spec.veleroSchedule if spec?.veleroSchedule != Undefined else {}
            velero_enabled = vsched.enabled if vsched?.enabled != Undefined else d.veleroEnabled
            velero_retention = vsched.retention if vsched?.retention != Undefined else d.veleroRetention
            velero_schedule = vsched.schedule if vsched?.schedule != Undefined else "0 2 * * *"

            # subdomainSuffix:
            #   - nonlive / ephemeral → HARDCODED al nombre del env (ignoramos
            #     spec.subdomainSuffix si lo trae). Garantiza unicidad sin
            #     que el usuario tenga que recordar configurarlo.
            #   - live → spec.subdomainSuffix (opcional, default "").
            #     Permite zone-morocco-old (suffix "") y zone-morocco (suffix
            #     "new") coexistiendo en el mismo dominio durante migración;
            #     cuando se valide se cambia el suffix de morocco a "".
            _live_suffix = spec.subdomainSuffix if spec?.subdomainSuffix != Undefined else ""
            subdomain_suffix = env if envType in ["nonlive", "ephemeral"] else _live_suffix

            # function-kcl matchea recursos por dual annotation; helper compacto.
            anno = lambda n: str -> {str:str} {{
                "krm.kcl.dev/composition-resource-name" = n
                "crossplane.io/composition-resource-name" = n
                "krm.kcl.dev/ready" = "True"
            }}

            # Bootstrap toggles (default True).
            do_pg = spec.bootstrapPostgres if spec?.bootstrapPostgres != Undefined else True
            do_mysql = spec.bootstrapMysql if spec?.bootstrapMysql != Undefined else True
            do_rmq = spec.bootstrapRabbitmq if spec?.bootstrapRabbitmq != Undefined else True

            # ── Templates YAML (placeholders ${VAR}, sustituidos con .replace) ─

            _namespace = yaml.decode("""
            apiVersion: v1
            kind: Namespace
            metadata:
              name: \${NS}
              labels:
                env-type: \${TYPE}
                stage: \${STAGE}
                docline.io/managed-by: crossplane
                docline.io/environment: \${ENV}
            """.replace("\${NS}", ns).replace("\${TYPE}", envType).replace("\${STAGE}", stage).replace("\${ENV}", env))
            _namespace.metadata.annotations = anno("namespace")

            _netpol = yaml.decode("""
            apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: default-deny-all
              namespace: \${NS}
            spec:
              podSelector: {}
              policyTypes: [Ingress, Egress]
            """.replace("\${NS}", ns))
            _netpol.metadata.annotations = anno("netpol-default-deny")

            # ConfigMap env-config — metadatos del entorno para que cualquier
            # Deployment del ns consuma vía envFrom.configMapRef:
            #   - SUBDOMAIN_SUFFIX: sufijo de subdominio (DNS-safe). Para
            #     entornos nonlive/ephemeral = nombre del env. Para live =
            #     spec.subdomainSuffix (default ""). Permite zone-morocco +
            #     zone-morocco-old en el mismo dominio durante migración.
            #   - ENV_NAME / ENV_TYPE / ENV_STAGE: convenientes para tags,
            #     log enrichment, etc.
            _env_config = yaml.decode("""
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: env-config
              namespace: \${NS}
            data:
              ENV_NAME: \"\${ENV}\"
              ENV_TYPE: \"\${TYPE}\"
              ENV_STAGE: \"\${STAGE}\"
              SUBDOMAIN_SUFFIX: \"\${SUFFIX}\"
            """.replace("\${NS}", ns).replace("\${ENV}", env).replace("\${TYPE}", envType).replace("\${STAGE}", stage).replace("\${SUFFIX}", subdomain_suffix))
            _env_config.metadata.annotations = anno("env-config")

            _velero = yaml.decode("""
            apiVersion: velero.io/v1
            kind: Schedule
            metadata:
              name: env-\${ENV}-daily
              namespace: velero
            spec:
              schedule: "\${SCHEDULE}"
              template:
                ttl: \${RETENTION}
                includedNamespaces: [\${NS}]
                snapshotVolumes: true
                defaultVolumesToFsBackup: false
            """.replace("\${ENV}", env).replace("\${NS}", ns).replace("\${SCHEDULE}", velero_schedule).replace("\${RETENTION}", velero_retention)) if velero_enabled else None
            if _velero != None: _velero.metadata.annotations = anno("velero-schedule")

            _pg_env_roles = yaml.decode("""
            apiVersion: secrets.infisical.com/v1alpha1
            kind: InfisicalSecret
            metadata:
              name: pg-env-roles-\${ENV}-sync
              namespace: \${NS}
            spec:
              hostAPI: http://hub-proxy.infisical.svc.cluster.local:8080/api
              syncConfig: { resyncInterval: 450s }
              authentication:
                universalAuth:
                  credentialsRef: { secretName: infisical-eso-auth, secretNamespace: \${NS} }
                  secretsScope:
                    projectSlug: \${PROJECT}
                    envSlug: \${STAGE}
                    secretsPath: /postgres/roles
                    recursive: false
              managedKubeSecretReferences:
                - secretName: pg-env-roles-\${ENV}
                  secretNamespace: \${NS}
                  creationPolicy: Owner
                  template:
                    includeAllSecrets: true
                    # Reflector replica este Secret al ns pgbouncer, donde el
                    # Deployment pgbouncer-<env> emitido por XZonePostgreBoostrap
                    # lo monta como auth_file. Sin estas annotations el Secret
                    # queda solo en infra-<env> y los pods pgbouncer no arrancan.
                    metadata:
                      annotations:
                        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
                        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
                        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: pgbouncer
            """.replace("\${ENV}", env).replace("\${NS}", ns).replace("\${STAGE}", stage).replace("\${PROJECT}", d.infisicalProject))
            _pg_env_roles.metadata.annotations = anno("pg-env-roles-bridge")

            # RMQ user creds bridge: emite rmq-<env>-user-creds en namespace
            # `rabbitmq` (donde el operator de RabbitMQ lee importCredentialsSecret
            # del User CR). El bridge necesita infisical-eso-auth en `rabbitmq` —
            # ya presente porque las bridges admin/readonly viven ahí. Source:
            # \${PROJECT}/\${STAGE}/rabbitmq/{username,password}.
            #
            # Reflector annotations: los microservicios en core-<env> consumen
            # rmq-<env>-user-creds (envFrom/secretKeyRef) en su propio namespace.
            # Sin reflection-auto-namespaces el Secret solo existe en `rabbitmq`
            # y los pods de core-<env> fallan CreateContainerConfigError. Solo
            # se replica a core-<env> (no a otros envs) para evitar cruces.
            _rmq_user_creds = yaml.decode("""
            apiVersion: secrets.infisical.com/v1alpha1
            kind: InfisicalSecret
            metadata:
              name: rmq-\${ENV}-user-creds-sync
              namespace: rabbitmq
            spec:
              hostAPI: http://hub-proxy.infisical.svc.cluster.local:8080/api
              syncConfig: { resyncInterval: 450s }
              authentication:
                universalAuth:
                  credentialsRef: { secretName: infisical-eso-auth, secretNamespace: rabbitmq }
                  secretsScope:
                    projectSlug: \${PROJECT}
                    envSlug: \${STAGE}
                    secretsPath: /rabbitmq
                    recursive: false
              managedKubeSecretReferences:
                - secretName: rmq-\${ENV}-user-creds
                  secretNamespace: rabbitmq
                  creationPolicy: Owner
                  template:
                    includeAllSecrets: true
                    metadata:
                      annotations:
                        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
                        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
                        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: core-\${ENV}
            """.replace("\${ENV}", env).replace("\${STAGE}", stage).replace("\${PROJECT}", d.infisicalProject))
            _rmq_user_creds.metadata.annotations = anno("rmq-user-creds-bridge")

            # XZone*Boostrap claims. PG/MySQL XRDs son Namespaced (viven en
            # infra-<env>); RMQ XRD es Cluster (sin namespace). spec.type se
            # añadirá cuando los XRDs de databases-bootstrap / rabbitmq-bootstrap
            # lo soporten — TODO próxima iteración.
            _ns_claim_tmpl = """
            apiVersion: bootstrap.docline.io/v1alpha1
            kind: \${KIND}
            metadata:
              name: \${ENV}-\${SUFFIX}
              namespace: \${NS}
            spec:
              env: \${ENV}
            """
            _cluster_claim_tmpl = """
            apiVersion: bootstrap.docline.io/v1alpha1
            kind: \${KIND}
            metadata:
              name: \${ENV}-\${SUFFIX}
            spec:
              env: \${ENV}
            """

            _pg_claim = yaml.decode(_ns_claim_tmpl.replace("\${KIND}", "XZonePostgreBoostrap").replace("\${SUFFIX}", "postgres").replace("\${ENV}", env).replace("\${NS}", ns)) if do_pg else None
            if _pg_claim != None: _pg_claim.metadata.annotations = anno("postgres-bootstrap")

            _mysql_claim = yaml.decode(_ns_claim_tmpl.replace("\${KIND}", "XZoneMysqlBoostrap").replace("\${SUFFIX}", "mysql").replace("\${ENV}", env).replace("\${NS}", ns)) if do_mysql else None
            if _mysql_claim != None: _mysql_claim.metadata.annotations = anno("mysql-bootstrap")

            _rmq_claim = yaml.decode(_cluster_claim_tmpl.replace("\${KIND}", "XZoneRabbitmqBoostrap").replace("\${SUFFIX}", "rabbitmq").replace("\${ENV}", env)) if do_rmq else None
            if _rmq_claim != None: _rmq_claim.metadata.annotations = anno("rabbitmq-bootstrap")

            # CronJob bootstrap carpetas Infisical: los InfisicalSecrets
            # pg-env-roles-<env>-sync y rmq-<env>-user-creds-sync referencian
            # /postgres/roles y /rabbitmq respectivamente en el proyecto
            # Infisical del entorno. Si las carpetas no existen, el sync queda
            # en error 404 y los Secrets K8s nunca se crean — los pods en
            # core-<env> no arrancan. Este CronJob las crea de forma idempotente.
            #
            # Auth: Universal Auth login con clientId/clientSecret del Secret
            # infisical-eso-auth (ya populado en cada infra-<env> por el bridge
            # de identidad). El access token devuelto se usa para los POST
            # /v1/folders. NO se usa identityAccessToken — ese campo no existe
            # en el Secret; sólo está disponible vía login UA.
            #
            # workspaceId se resuelve dentro del Job vía GET /v1/workspace
            # filtrando por slug, así no hay que hardcodear IDs por entorno.
            # NetworkPolicy específica para los pods del CronJob.
            # El ns infra-<env> tiene default-deny-all (emitido por esta misma
            # Composition). El pod del bootstrap necesita salir a:
            #   - kube-dns (UDP/TCP 53) — resolver hub-proxy y registry alpine
            #   - hub-proxy.infisical:8080 — API Infisical (login + folders)
            #   - internet 443 — apk add curl jq desde dl-cdn.alpinelinux.org
            _folder_bootstrap_netpol = yaml.decode("""
            apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-infisical-folders-bootstrap
              namespace: \${NS}
            spec:
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: infisical-folders-bootstrap
              policyTypes: [Egress]
              egress:
                - to:
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: kube-system
                  ports:
                    - { port: 53, protocol: UDP }
                    - { port: 53, protocol: TCP }
                - to:
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: infisical
                  ports:
                    - { port: 8080, protocol: TCP }
                - ports:
                    - { port: 443, protocol: TCP }
            """.replace("\${NS}", ns))
            _folder_bootstrap_netpol.metadata.annotations = anno("infisical-folders-bootstrap-netpol")

            _folder_bootstrap = yaml.decode("""
            apiVersion: batch/v1
            kind: CronJob
            metadata:
              name: infisical-folders-bootstrap
              namespace: \${NS}
              labels:
                docline.io/managed-by: crossplane
                docline.io/environment: \${ENV}
                app.kubernetes.io/name: infisical-folders-bootstrap
            spec:
              schedule: "*/15 * * * *"
              successfulJobsHistoryLimit: 1
              failedJobsHistoryLimit: 2
              concurrencyPolicy: Forbid
              startingDeadlineSeconds: 120
              jobTemplate:
                spec:
                  backoffLimit: 2
                  template:
                    metadata:
                      labels:
                        app.kubernetes.io/name: infisical-folders-bootstrap
                    spec:
                      restartPolicy: OnFailure
                      containers:
                      - name: create-folders
                        image: docker.io/alpine:3.19
                        env:
                        - name: INFISICAL_CLIENT_ID
                          valueFrom:
                            secretKeyRef:
                              name: infisical-eso-auth
                              key: clientId
                        - name: INFISICAL_CLIENT_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: infisical-eso-auth
                              key: clientSecret
                        - name: INFISICAL_API
                          value: http://hub-proxy.infisical.svc.cluster.local:8080/api
                        - name: INFISICAL_PROJECT_SLUG
                          value: \${PROJECT}
                        - name: INFISICAL_ENV
                          value: \${STAGE}
                        - name: FOLDERS
                          value: "/:rabbitmq /:postgres /postgres:roles"
                        command:
                        - /bin/sh
                        - -c
                        - |
                          set -eu
                          apk add --no-cache curl jq >/dev/null

                          API="$INFISICAL_API"
                          SLUG="$INFISICAL_PROJECT_SLUG"
                          ENV_SLUG="$INFISICAL_ENV"

                          echo "Login Universal Auth ..."
                          TOKEN=$(curl -fsS -X POST "$API/v1/auth/universal-auth/login" \\
                            -H "Content-Type: application/json" \\
                            -d "{\\"clientId\\":\\"$INFISICAL_CLIENT_ID\\",\\"clientSecret\\":\\"$INFISICAL_CLIENT_SECRET\\"}" \\
                            | jq -r '.accessToken')
                          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
                            echo "ERROR: UA login devolvió token vacío"
                            exit 1
                          fi

                          echo "Resolviendo workspaceId para slug=$SLUG ..."
                          WID=$(curl -fsS "$API/v1/workspace" \\
                            -H "Authorization: Bearer $TOKEN" \\
                            | jq -r --arg s "$SLUG" '.workspaces[] | select(.slug==$s) | .id')
                          if [ -z "$WID" ]; then
                            echo "ERROR: no workspace con slug=$SLUG accesible para la identidad"
                            exit 1
                          fi
                          echo "workspaceId=$WID"

                          RC=0
                          for pair in $FOLDERS; do
                            PARENT=$(echo "$pair" | cut -d: -f1)
                            NAME=$(echo "$pair" | cut -d: -f2)
                            HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \\
                              -X POST "$API/v1/folders" \\
                              -H "Authorization: Bearer $TOKEN" \\
                              -H "Content-Type: application/json" \\
                              -d "{\\"workspaceId\\":\\"$WID\\",\\"environment\\":\\"$ENV_SLUG\\",\\"name\\":\\"$NAME\\",\\"path\\":\\"$PARENT\\"}")
                            case "$HTTP" in
                              200|201)
                                echo "  CREATED $PARENT/$NAME";;
                              400)
                                if grep -q "already exists" /tmp/resp.json; then
                                  echo "  EXISTS  $PARENT/$NAME"
                                else
                                  echo "  FAIL    $PARENT/$NAME (HTTP $HTTP)"
                                  cat /tmp/resp.json; echo
                                  RC=1
                                fi
                                ;;
                              *)
                                echo "  FAIL    $PARENT/$NAME (HTTP $HTTP)"
                                cat /tmp/resp.json; echo
                                RC=1;;
                            esac
                          done
                          exit $RC
            """.replace("\${NS}", ns).replace("\${ENV}", env).replace("\${PROJECT}", d.infisicalProject).replace("\${STAGE}", stage))
            _folder_bootstrap.metadata.annotations = anno("infisical-folders-bootstrap")

            items = [_namespace, _netpol, _env_config, _pg_env_roles, _rmq_user_creds, _folder_bootstrap_netpol, _folder_bootstrap] + [r for r in [_velero, _pg_claim, _mysql_claim, _rmq_claim] if r != None]
