apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: crossplane-package-environment
  annotations:
    meta.crossplane.io/maintainer: "Docline platform"
    meta.crossplane.io/source: "https://github.com/sfernandez-docline/crossplane-package-environment"
    meta.crossplane.io/license: "Apache-2.0"
    meta.crossplane.io/description: |
      Crossplane Configuration package que define el XRD `Environment` (claim
      `Environment`) parametrizado por `spec.type` (live | nonlive | ephemeral).
      Una sola Composition con branching por type aplica las políticas
      operacionales correspondientes:
        - live:      Velero retention 30d, deletionPolicy Orphan, NetworkPolicy strict
        - nonlive:   Velero retention 7d, deletionPolicy Delete, parentEnvs chain
        - ephemeral: TTL cleanup, no backup
      Reemplaza los paquetes históricos crossplane-package-env-{live,nonlive,
      ephemeral} (3 paquetes con 90% código duplicado) por 1 unificado.

      xflow Composition descubre los Environment claims aplicados al cluster
      vía function-extra-resources, eliminando la necesidad de declarar
      `spec.environments[]` inline en cada Flow XR.
spec:
  crossplane:
    version: ">=v1.18.0-0"
  dependsOn:
    - function: xpkg.upbound.io/crossplane-contrib/function-kcl
      version: ">=v0.12.0,<v0.13.0"
    # provider-kubernetes: necesario para emitir un Object que crea
    # `pgbouncer/pg-env-roles-<env>` con labels pgbouncer.docline.io/* y
    # `data` inyectada vía spec.references.patchesFrom desde el Secret
    # origen en infra-<env>. Reemplaza el Reflector annotation previo
    # (Reflector no propaga labels al destino, y el sidecar userlist-reloader
    # del Deployment pgbouncer-<env> requiere ambas labels para incluir
    # las keys en userlist.txt y mandar SIGHUP).
    - provider: xpkg.upbound.io/crossplane-contrib/provider-kubernetes
      version: ">=v0.14.0,<v2.0.0"
